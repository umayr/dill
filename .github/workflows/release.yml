name: Release Pkl Package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pkl
        run: |
          curl -L \
            -o /usr/local/bin/pkl \
            https://github.com/apple/pkl/releases/latest/download/pkl-linux-amd64

          chmod +x /usr/local/bin/pkl

          pkl --version

      - name: Build package
        run: |
          mkdir -p .out
          pkl project package . --output-path .out --skip-publish-check

          echo "Generated files:"
          ls -lah .out

      - name: Verify archive contents
        run: |
          unzip -l .out/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .out/*.zip
            .out/*.sha256