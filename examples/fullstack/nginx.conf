server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — required for runtime resolution of upstream names.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Variable forces nginx to resolve 'api' per-request via the resolver
        # above, rather than at config-load time (which races with container DNS).
        set $upstream http://api:8080;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
